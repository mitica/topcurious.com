<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#fbfaf7"/>

  <defs>
    <pattern id="dotTexture" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ece7da"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dotTexture)"/>

  <!-- Stacked logo, visually centered (shifted left to balance wider tagline) -->
  <image x="320" y="150" width="460" height="218" xlink:href="logo.svg"/>

  <!-- Italic tagline aligned with logo left edge -->
  <text x="320" y="450" font-family="Georgia, serif" font-size="30" font-style="italic" fill="#3b3f48">The most curious tops on the internet</text>
</svg>
